services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cantinhodavovo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cantinhodavovo']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  postgres_data:
