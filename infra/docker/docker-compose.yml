services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cantinhodavovo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cantinhodavovo']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../.env
    environment:
      NODE_ENV: development
      APP_ORIGIN: http://localhost:8080
      CORS_ORIGIN: http://localhost:8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cantinhodavovo
    command:
      - sh
      - -c
      - node dist-server/tools/database/migrate.js && node dist-server/tools/database/seed.js && node dist-server/server/app/index.js
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4000:4000'

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  postgres_data:
